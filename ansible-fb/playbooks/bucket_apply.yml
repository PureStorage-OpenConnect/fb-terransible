---
- name: Manage FlashBlade S3 bucket (apply)
  hosts: localhost
  gather_facts: false

  vars:
    fb_url: "{{ fb_url | mandatory }}"
    api_token: "{{ api_token | mandatory }}"
    bucket_name: "{{ bucket_name | mandatory }}"
    account_name: "{{ account_name | mandatory }}"
    versioning: "{{ versioning | default('absent') }}"

  tasks:
    - name: Ensure S3 bucket is present
      purestorage.flashblade.purefb_bucket: >-
        {{
          _base | combine(_versioning) | combine(_quota)
        }}
      vars:
        _base:
          name: "{{ bucket_name }}"
          account: "{{ account_name }}"
          state: present
          fb_url: "{{ fb_url }}"
          api_token: "{{ api_token }}"
        _versioning: >-
          {{ {'versioning': versioning} if versioning in ['enabled', 'suspended'] else {} }}
        _quota: >-
          {{ {'quota': quota, 'hard_limit': hard_limit | bool}
             if quota is defined and quota not in [None, '', 'None', 'null']
             else {} }}
