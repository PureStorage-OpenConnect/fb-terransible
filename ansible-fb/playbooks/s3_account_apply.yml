---
- name: Manage FlashBlade S3 object store account (apply)
  hosts: localhost
  gather_facts: false

  vars:
    fb_url: "{{ fb_url | mandatory }}"
    api_token: "{{ api_token | mandatory }}"
    account_name: "{{ account_name | mandatory }}"

  tasks:
    - name: Ensure S3 object store account is present
      purestorage.flashblade.purefb_s3acc:
        name: "{{ account_name }}"
        state: present
        quota: "{{ omit if quota is not defined or quota in [None, '', 'None', 'null'] else quota }}"
        hard_limit: "{{ omit if hard_limit is not defined or hard_limit in [None, '', 'None', 'null'] else hard_limit }}"
        fb_url: "{{ fb_url }}"
        api_token: "{{ api_token }}"
