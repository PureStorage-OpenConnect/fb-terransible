---
- name: Manage FlashBlade S3 object store account (apply)
  hosts: localhost
  gather_facts: false

  vars:
    fb_url: "{{ fb_url | mandatory }}"
    api_token: "{{ api_token | mandatory }}"
    account_name: "{{ account_name | mandatory }}"

  tasks:
    - name: Ensure S3 object store account is present
      purestorage.flashblade.purefb_s3acc: >-
        {{
          _base | combine(_quota)
        }}
      vars:
        _base:
          name: "{{ account_name }}"
          state: present
          fb_url: "{{ fb_url }}"
          api_token: "{{ api_token }}"
        _quota: >-
          {{ {'quota': quota, 'hard_limit': hard_limit | bool}
             if quota is defined and quota not in [None, '', 'None', 'null']
             else {} }}
